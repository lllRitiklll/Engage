<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-xl font-bold mb-4">Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea name="bio" placeholder="Your bio"
                  class="w-full border p-2 rounded mb-3">{{ user.bio }}</textarea>

        <input type="file" name="profile_picture" class="mb-3 w-full">

        <button class="bg-green-500 text-white px-4 py-2 rounded w-full">
            Save
        </button>
    </form>

</div>

</body>
</html>
