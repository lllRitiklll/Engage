<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Engage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen font-sans text-gray-900 flex flex-col">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="/" class="text-xl font-extrabold tracking-tight text-black hover:opacity-70 transition-opacity">
            Engage
        </a>

        <div class="flex items-center gap-6">
            <a href="/" class="hidden sm:block text-sm font-medium text-gray-500 hover:text-black transition-colors">Home</a>
            <a href="{% url 'signup' %}" class="text-sm font-semibold text-black bg-gray-100 px-4 py-2 rounded-full hover:bg-gray-200 transition-all">
                Sign Up
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-sm">
            
            <div class="bg-white border border-gray-200 p-8 rounded-3xl shadow-sm">
                
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold tracking-tight mb-2">Welcome Back</h1>
                    <p class="text-gray-500 text-sm">Please enter your details to login.</p>
                </div>

                <form method="POST" class="space-y-4">
                    {% csrf_token %}

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5 ml-1">Username</label>
                        <input 
                            type="text" 
                            name="username" 
                            placeholder="Enter username"
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all"
                            required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5 ml-1">Password</label>
                        <input 
                            type="password" 
                            name="password" 
                            placeholder="Enter password"
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:bg-white focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all"
                            required>
                    </div>

                    <button 
                        type="submit"
                        class="w-full bg-black text-white font-bold py-3.5 rounded-xl hover:bg-gray-800 transition-colors active:scale-[0.98] transform mt-2 shadow-lg shadow-gray-200">
                        Login
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                    <p class="text-sm text-gray-500">
                        Don’t have an account? 
                        <a href="{% url 'signup' %}" class="text-black font-bold hover:underline underline-offset-4">
                            Sign up
                        </a>
                    </p>
                </div>
            </div>

            <p class="text-center text-gray-400 text-[11px] mt-8 tracking-wide uppercase">
                &copy; 2026 Engage &bull; Simple & Secure
            </p>
        </div>
    </main>

</body>
</html>
