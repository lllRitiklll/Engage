<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-xl font-bold mb-4">Create Post</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="file" name="image" class="mb-3 w-full">

        <textarea name="caption" placeholder="Write a caption..."
                  class="w-full border p-2 rounded mb-3"></textarea>

        <button class="bg-blue-500 text-white px-4 py-2 rounded w-full">
            Post
        </button>
    </form>

</div>

</body>
</html>
